<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vipe">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<title>Vipe Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --s1: #111118;
  --s2: #1a1a24;
  --s3: #252530;
  --accent: #a78bfa;
  --green: #34d399;
  --red: #f87171;
  --blue: #60a5fa;
  --amber: #fbbf24;
  --pink: #f472b6;
  --text: #e8e8f0;
  --t2: #9090a8;
  --t3: #52526a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --sat: env(safe-area-inset-top,0px);
  --sab: env(safe-area-inset-bottom,0px);
  --sal: env(safe-area-inset-left,0px);
  --sar: env(safe-area-inset-right,0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}

body{
  font-family:'DM Mono',monospace;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}

/* ── APP SHELL ── */
#app{
  display:flex;
  flex-direction:column;
  height:100%;
  height:100dvh;
}

/* ── STATUS BAR SPACER ── */
.status-bar{
  height:var(--sat);
  background:var(--s1);
  flex-shrink:0;
}

/* ── TOP BAR ── */
.topbar{
  background:var(--s1);
  border-bottom:1px solid var(--border);
  padding:12px 16px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}

.logo-wrap{display:flex;flex-direction:column;gap:0px;}
.logo-eyebrow{font-size:9px;letter-spacing:.22em;color:var(--accent);text-transform:uppercase;}
.logo-name{
  font-family:'Syne',sans-serif;
  font-size:24px;font-weight:800;
  color:var(--text);letter-spacing:-.02em;line-height:1;
}
.logo-name em{color:var(--accent);font-style:normal;}

.topbar-right{display:flex;align-items:center;gap:8px;}

.stat-badges{display:flex;gap:6px;}
.badge{
  display:flex;flex-direction:column;align-items:center;
  background:var(--s2);border:1px solid var(--border);
  border-radius:10px;padding:5px 9px;
}
.badge .n{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);line-height:1;}
.badge .l{font-size:8px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}

.fab{
  width:40px;height:40px;border-radius:50%;
  background:var(--accent);border:none;
  color:#1a0a3a;font-size:24px;font-weight:300;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .12s;flex-shrink:0;
}
.fab:active{transform:scale(.88);}

/* ── TABS ── */
.tabs{
  display:flex;
  background:var(--s1);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tab-btn{
  flex:1;padding:11px 0;
  background:none;border:none;
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--t3);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── PAGES ── */
.pages{flex:1;overflow:hidden;position:relative;}
.page{
  position:absolute;inset:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding-bottom:20px;
  display:none;
}
.page.active{display:block;}

/* ── CALENDAR PAGE ── */
.cal-month-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;
}
.mnav-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s;
}
.mnav-btn:active{background:var(--s3);}
.month-label{
  font-family:'Syne',sans-serif;
  font-size:17px;font-weight:700;
  color:var(--text);letter-spacing:-.01em;
}

.legend-row{
  display:flex;gap:12px;padding:0 16px 10px;flex-wrap:wrap;
}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t3);}
.legend-bar{width:18px;height:6px;border-radius:3px;}

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:0;
  padding:0 10px;
}

.dl{
  text-align:center;font-size:9px;
  color:var(--t3);letter-spacing:.1em;
  text-transform:uppercase;padding:0 0 6px;
}

.dc{
  border:none;
  padding:4px 0 3px;
  cursor:pointer;
  min-height:56px;
  position:relative;
  background:transparent;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.dc:not(.empty):active{opacity:.6;}
.dc.empty{cursor:default;}

.dc-num{
  font-size:10px;color:var(--t3);line-height:1;
  text-align:center;z-index:2;position:relative;
  width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;flex-shrink:0;margin-bottom:3px;
}
.dc.today .dc-num{
  color:#1a0a3a;font-weight:700;
  background:var(--accent);
}

/* ── BANDS ── */
.bands{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:2px;
  padding:0;
}

.band{
  height:6px;
  width:100%;
  border-radius:0;
  flex-shrink:0;
}
.band.cap-l  { border-radius:3px 0 0 3px; margin-left:3px; width:calc(100% - 3px); }
.band.cap-r  { border-radius:0 3px 3px 0; margin-right:3px; width:calc(100% - 3px); }
.band.cap-both{ border-radius:3px; margin:0 3px; width:calc(100% - 6px); }
.band.gap    { background:transparent!important; }

/* ── RECORDS PAGE ── */
.section-head{
  padding:16px 16px 10px;
  font-size:10px;letter-spacing:.15em;text-transform:uppercase;
  color:var(--t3);
}

.record-card{
  margin:0 12px 8px;
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 14px 14px 0;
  display:flex;
  gap:12px;
  cursor:pointer;
  transition:background .1s;
  overflow:hidden;
  position:relative;
}
.record-card:active{background:var(--s2);}

.record-stripe{
  width:4px;border-radius:0 3px 3px 0;
  flex-shrink:0;
}

.record-body{flex:1;min-width:0;}
.record-name{
  font-family:'Syne',sans-serif;
  font-size:14px;font-weight:700;
  color:var(--text);margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.flavor-tag{
  display:inline-block;
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  padding:2px 8px;border-radius:99px;border:1px solid;
  margin-bottom:5px;
}
.record-dates{font-size:10px;color:var(--t3);}
.record-count{font-size:11px;font-weight:500;margin-top:3px;}
.record-note{font-size:10px;color:var(--t3);margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.active-badge{
  position:absolute;top:10px;right:12px;
  font-size:9px;letter-spacing:.08em;
  padding:3px 8px;border-radius:99px;
  background:rgba(52,211,153,.12);
  color:var(--green);border:1px solid rgba(52,211,153,.3);
}

.empty-state{
  display:flex;flex-direction:column;align-items:center;
  padding:60px 20px;gap:8px;
}
.empty-icon{font-size:40px;opacity:.3;}
.empty-text{font-size:12px;color:var(--t3);letter-spacing:.05em;text-align:center;}

/* ── BOTTOM NAV ── */
.bottom-nav{
  display:none; /* using tabs instead */
}

/* ── MODAL ── */
.modal-backdrop{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:100;
  align-items:flex-end;
  justify-content:center;
}
.modal-backdrop.open{display:flex;}

.modal{
  background:var(--s1);
  border:1px solid var(--border2);
  border-radius:24px 24px 0 0;
  padding:0;
  width:100%;
  max-height:92dvh;
  display:flex;
  flex-direction:column;
  animation:slideUp .25s cubic-bezier(.22,1,.36,1);
}

@keyframes slideUp{
  from{transform:translateY(100%);}
  to{transform:translateY(0);}
}

.modal-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--border2);
  margin:12px auto 0;flex-shrink:0;
}

.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 14px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.modal-head h3{
  font-family:'Syne',sans-serif;
  font-size:17px;font-weight:700;
  color:var(--text);letter-spacing:-.01em;
}
.modal-close-btn{
  width:32px;height:32px;border-radius:50%;
  background:var(--s2);border:1px solid var(--border);
  color:var(--t2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.modal-close-btn:active{background:var(--s3);}

.modal-scroll{
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  flex:1;
  padding:20px 20px calc(var(--sab) + 16px);
}

.form-row{margin-bottom:16px;}
.form-label{
  display:block;font-size:9px;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--t3);margin-bottom:7px;
}
.form-input,.form-textarea{
  width:100%;
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:14px;
  padding:13px 14px;
  outline:none;
  transition:border-color .15s;
  -webkit-appearance:none;
}
.form-input:focus,.form-textarea:focus{
  border-color:var(--accent);
}
.form-input::placeholder{color:var(--t3);}
.form-textarea{resize:none;height:72px;}

/* iOS date input fix */
input[type="date"]{
  -webkit-appearance:none;
  appearance:none;
  color:var(--text);
}

.date-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.color-picker{display:flex;gap:8px;flex-wrap:wrap;}
.cswatch{
  width:30px;height:30px;border-radius:50%;
  border:2px solid transparent;cursor:pointer;
  transition:transform .12s;
}
.cswatch.sel{border-color:#fff;transform:scale(1.15);}
.cswatch:active{transform:scale(.9);}

.modal-footer{
  padding:12px 20px calc(var(--sab) + 16px);
  display:flex;gap:10px;
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.btn-save{
  flex:1;
  background:var(--accent);border:none;
  border-radius:14px;
  color:#1a0a3a;
  font-family:'Syne',sans-serif;
  font-size:14px;font-weight:700;
  padding:15px;cursor:pointer;
  letter-spacing:.04em;
  transition:transform .1s;
}
.btn-save:active{transform:scale(.96);}

.btn-del{
  background:rgba(248,113,113,.1);
  border:1px solid rgba(248,113,113,.3);
  border-radius:14px;
  color:var(--red);
  font-family:'DM Mono',monospace;
  font-size:13px;
  padding:15px 16px;cursor:pointer;
  transition:background .12s;
}
.btn-del:active{background:rgba(248,113,113,.2);}

/* ── INSTALL TOAST ── */
.install-toast{
  position:fixed;bottom:calc(var(--sab) + 20px);
  left:16px;right:16px;
  background:var(--s2);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:14px 16px;
  display:flex;gap:12px;align-items:center;
  z-index:50;
  animation:fadeIn .3s ease;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.install-toast.hidden{display:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.toast-icon{font-size:22px;flex-shrink:0;}
.toast-body{flex:1;}
.toast-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
.toast-sub{font-size:10px;color:var(--t3);line-height:1.4;}
.toast-close{
  background:none;border:none;color:var(--t3);
  font-size:18px;cursor:pointer;padding:4px;
}

/* scrollbar */
::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="app">
  <div class="status-bar"></div>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo-wrap">
      <span class="logo-eyebrow">usage tracker</span>
      <div class="logo-name">VIPE<em>.</em></div>
    </div>
    <div class="topbar-right">
      <div class="stat-badges">
        <div class="badge"><span class="n" id="s-total">0</span><span class="l">Total</span></div>
        <div class="badge"><span class="n" id="s-active">0</span><span class="l">Active</span></div>
        <div class="badge"><span class="n" id="s-days">0</span><span class="l">Days</span></div>
      </div>
      <button class="fab" onclick="openModal(null)" aria-label="追加">+</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('cal',this)">カレンダー</button>
    <button class="tab-btn" onclick="switchTab('list',this)">記録一覧</button>
  </div>

  <!-- PAGES -->
  <div class="pages">

    <!-- CALENDAR -->
    <div class="page active" id="page-cal">
      <div class="cal-month-nav">
        <button class="mnav-btn" onclick="changeMonth(-1)">&#8592;</button>
        <span class="month-label" id="month-label"></span>
        <button class="mnav-btn" onclick="changeMonth(1)">&#8594;</button>
      </div>
      <div class="legend-row" id="cal-legend">
        <div class="legend-item"><div class="legend-bar" style="background:var(--accent);opacity:.85"></div>使用期間</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- LIST -->
    <div class="page" id="page-list">
      <div class="section-head">使用記録</div>
      <div id="record-list"></div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <h3 id="modal-title">使用記録を追加</h3>
      <button class="modal-close-btn" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-scroll">
      <div class="form-row">
        <label class="form-label">製品名・ブランド</label>
        <input class="form-input" id="f-name" type="text" placeholder="例: RELX, IQOS..." autocomplete="off">
      </div>
      <div class="form-row">
        <label class="form-label">フレーバー</label>
        <input class="form-input" id="f-flavor" type="text" placeholder="例: メンソール, マンゴー..." autocomplete="off">
      </div>
      <div class="form-row">
        <label class="form-label">カラー</label>
        <div class="color-picker" id="color-picker"></div>
      </div>
      <div class="date-grid">
        <div class="form-row">
          <label class="form-label">開始日</label>
          <input class="form-input" id="f-start" type="date">
        </div>
        <div class="form-row">
          <label class="form-label">終了日（任意）</label>
          <input class="form-input" id="f-end" type="date">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">メモ（任意）</label>
        <textarea class="form-textarea" id="f-note" placeholder="感想やメモなど..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-save" onclick="saveRecord()">保存する</button>
      <button class="btn-del" id="btn-del" style="display:none" onclick="deleteRecord()">削除</button>
    </div>
  </div>
</div>

<!-- INSTALL TOAST -->
<div class="install-toast hidden" id="install-toast">
  <div class="toast-icon">📲</div>
  <div class="toast-body">
    <div class="toast-title">ホーム画面に追加</div>
    <div class="toast-sub">Safari の「共有」→「ホーム画面に追加」でアプリとして使えます</div>
  </div>
  <button class="toast-close" onclick="document.getElementById('install-toast').classList.add('hidden')">&#x2715;</button>
</div>

<script>
const PALETTE=['#a78bfa','#34d399','#f87171','#60a5fa','#fbbf24','#f472b6','#4ade80','#38bdf8','#fb923c','#c084fc'];
let records=[];
let curDate=new Date();
let editId=null;
let selColor=PALETTE[0];

try{records=JSON.parse(localStorage.getItem('vipe3')||'[]');}catch(e){}

function save(){try{localStorage.setItem('vipe3',JSON.stringify(records));}catch(e){}}

function pd(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fd(d){if(!d)return'';return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function t0(){const t=new Date();t.setHours(0,0,0,0);return t;}
function dbt(a,b){return Math.max(1,Math.round((b-a)/86400000)+1);}

function fDisp(s){
  if(!s)return'—';
  const d=pd(s);
  return`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

function updateStats(){
  const td=t0();
  const active=records.filter(r=>{
    const s=pd(r.start),e=r.end?pd(r.end):null;
    return s&&s<=td&&(!e||e>=td);
  }).length;
  let days=0;
  records.forEach(r=>{const s=pd(r.start),e=r.end?pd(r.end):t0();if(s)days+=dbt(s,e);});
  document.getElementById('s-total').textContent=records.length;
  document.getElementById('s-active').textContent=active;
  document.getElementById('s-days').textContent=days;
}

function switchTab(id,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}

function changeMonth(d){
  curDate=new Date(curDate.getFullYear(),curDate.getMonth()+d,1);
  renderCal();
}

function renderCal(){
  const y=curDate.getFullYear(),m=curDate.getMonth();
  document.getElementById('month-label').textContent=`${y}年${m+1}月`;
  const DAYS=['日','月','火','水','木','金','土'];
  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();
  const td=t0();

  // Update legend with record colors
  const legend=document.getElementById('cal-legend');
  if(records.length){
    legend.innerHTML=records.map(r=>{
      const c=r.color||PALETTE[0];
      return`<div class="legend-item"><div class="legend-bar" style="background:${c}"></div><span style="color:${c}">${r.name||'記録'}</span></div>`;
    }).join('');
  } else {
    legend.innerHTML='<div class="legend-item"><div class="legend-bar" style="background:var(--accent);opacity:.5"></div>使用期間</div>';
  }

  // Build per-day band info: array of {color, type} per record
  // type: 'start','mid','end','single','none'
  function getBands(date){
    const ds=fd(date);
    const col=date.getDay(); // 0=Sun,6=Sat
    return records.map(r=>{
      const c=r.color||PALETTE[0];
      const s=pd(r.start);
      const e=r.end?pd(r.end):null;
      if(!s)return null;
      const isStart=fd(s)===ds;
      const isEnd=e&&fd(e)===ds;
      const isMid=date>s&&(!e||date<e);
      const isSingle=isStart&&isEnd;
      if(isSingle) return{c,type:'single'};
      if(isStart)  return{c,type:'start',col};
      if(isEnd)    return{c,type:'end',col};
      if(isMid)    return{c,type:'mid',col};
      return null;
    }).filter(Boolean);
  }

  function bandClass(type,col){
    if(type==='single') return'cap-both';
    if(type==='start')  return'cap-l';
    if(type==='end')    return'cap-r';
    // mid: cap at week boundaries
    if(col===0) return'cap-l';
    if(col===6) return'cap-r';
    return'';
  }

  let h=DAYS.map(d=>`<div class="dl">${d}</div>`).join('');
  for(let i=0;i<first;i++)h+=`<div class="dc empty"></div>`;

  for(let d=1;d<=last;d++){
    const date=new Date(y,m,d);
    const ds=fd(date);
    const isToday=date.getTime()===td.getTime();
    const bands=getBands(date);

    // Build band rows — one per record that has activity, gap for inactive
    let bandHtml='';
    if(bands.length){
      // For each record show a band slot (gap if not active)
      records.forEach(r=>{
        const c=r.color||PALETTE[0];
        const match=bands.find(b=>b.c===c);
        if(match){
          const bc=bandClass(match.type,date.getDay());
          bandHtml+=`<div class="band ${bc}" style="background:${c};opacity:.85"></div>`;
        } else {
          // check if this record exists at all this month (show gap row only if record spans month)
          const s=pd(r.start),e=r.end?pd(r.end):null;
          const monthStart=new Date(y,m,1),monthEnd=new Date(y,m+1,0);
          if(s<=monthEnd&&(!e||e>=monthStart)){
            bandHtml+=`<div class="band gap"></div>`;
          }
        }
      });
    }

    h+=`<div class="dc${isToday?' today':''}" onclick="openModal('${ds}')">
      <div class="dc-num">${d}</div>
      <div class="bands">${bandHtml}</div>
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML=h;
}

function renderList(){
  const el=document.getElementById('record-list');
  if(!records.length){
    el.innerHTML=`<div class="empty-state">
      <div class="empty-icon">🌿</div>
      <div class="empty-text">まだ記録がありません<br>+ ボタンから追加してください</div>
    </div>`;
    return;
  }
  const sorted=[...records].map((r,i)=>({...r,_i:i})).sort((a,b)=>(b.start||'').localeCompare(a.start||''));
  el.innerHTML=sorted.map(r=>{
    const c=r.color||PALETTE[0];
    const s=pd(r.start),e=r.end?pd(r.end):t0();
    const days=s?dbt(s,e):0;
    const isActive=!r.end;
    return`<div class="record-card" onclick="editRecord(${r._i})">
      <div class="record-stripe" style="background:${c}"></div>
      <div class="record-body">
        <div class="record-name">${r.name||'名称なし'}</div>
        ${r.flavor?`<span class="flavor-tag" style="background:${c}18;border-color:${c}44;color:${c}">${r.flavor}</span>`:''}
        <div class="record-dates">${fDisp(r.start)} → ${r.end?fDisp(r.end):'現在'}</div>
        <div class="record-count" style="color:${c}">${days}日間</div>
        ${r.note?`<div class="record-note">${r.note}</div>`:''}
      </div>
      ${isActive?`<div class="active-badge">使用中</div>`:''}
    </div>`;
  }).join('');
}

function buildColorPicker(){
  document.getElementById('color-picker').innerHTML=PALETTE.map(c=>
    `<div class="cswatch${selColor===c?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}

function pickColor(c){selColor=c;buildColorPicker();}

function openModal(ds){
  editId=null;selColor=PALETTE[0];
  document.getElementById('modal-title').textContent='使用記録を追加';
  document.getElementById('f-name').value='';
  document.getElementById('f-flavor').value='';
  document.getElementById('f-start').value=ds&&ds!=='null'?ds:fd(t0());
  document.getElementById('f-end').value='';
  document.getElementById('f-note').value='';
  document.getElementById('btn-del').style.display='none';
  buildColorPicker();
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),300);
}

function editRecord(i){
  editId=i;
  const r=records[i];
  selColor=r.color||PALETTE[0];
  document.getElementById('modal-title').textContent='記録を編集';
  document.getElementById('f-name').value=r.name||'';
  document.getElementById('f-flavor').value=r.flavor||'';
  document.getElementById('f-start').value=r.start||'';
  document.getElementById('f-end').value=r.end||'';
  document.getElementById('f-note').value=r.note||'';
  document.getElementById('btn-del').style.display='block';
  buildColorPicker();
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal(){document.getElementById('modal-bg').classList.remove('open');}

function saveRecord(){
  const name=document.getElementById('f-name').value.trim();
  const flavor=document.getElementById('f-flavor').value.trim();
  const start=document.getElementById('f-start').value;
  const end=document.getElementById('f-end').value;
  const note=document.getElementById('f-note').value.trim();
  if(!start){alert('開始日を入力してください');return;}
  const rec={name,flavor,start,end:end||'',note,color:selColor};
  if(editId!==null)records[editId]=rec;
  else records.push(rec);
  save();closeModal();renderAll();
}

function deleteRecord(){
  if(editId!==null&&confirm('この記録を削除しますか？')){
    records.splice(editId,1);save();closeModal();renderAll();
  }
}

function renderAll(){renderCal();renderList();updateStats();}

// Show install toast on iOS Safari if not in standalone
function checkInstall(){
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone===true;
  const shown=localStorage.getItem('toast_shown');
  if(isIOS&&!isStandalone&&!shown){
    document.getElementById('install-toast').classList.remove('hidden');
    localStorage.setItem('toast_shown','1');
  }
}

// Service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

renderAll();
checkInstall();
</script>
</body>
